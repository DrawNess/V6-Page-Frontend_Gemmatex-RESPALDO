<section class="relative min-h-screen w-screen overflow-hidden bg-gradient-to-b from-slate-50 to-slate-100">
  <!-- Fondo con blobs suaves -->
  <div class="pointer-events-none absolute inset-0 opacity-70 mix-blend-multiply">
    <div class="absolute -top-24 -left-24 w-[40rem] h-[40rem] rounded-full bg-sky-200 blur-3xl animate-blob"></div>
    <div class="absolute -bottom-24 -right-24 w-[40rem] h-[40rem] rounded-full bg-fuchsia-200 blur-3xl animate-blob animation-delay-2000"></div>
    <div class="absolute top-1/3 left-1/2 -translate-x-1/2 w-[30rem] h-[30rem] rounded-full bg-amber-200 blur-3xl animate-blob animation-delay-4000"></div>
  </div>

  <!-- Contenido -->
  <div class="relative z-10 mx-auto flex min-h-screen max-w-4xl items-center justify-center px-6 py-12">
    <div class="w-full rounded-3xl border border-white/60 bg-white/70 shadow-xl backdrop-blur-md p-8 sm:p-12 text-center">
      <!-- Carita triste animada (SVG) -->
      <div class="mx-auto mb-6 h-20 w-20 rounded-full bg-slate-100 flex items-center justify-center shadow inner-shadow sad-float">
        <svg viewBox="0 0 24 24" class="h-10 w-10 text-slate-500">
          <circle cx="12" cy="12" r="10" fill="currentColor" opacity="0.08"></circle>
          <circle cx="9" cy="10" r="1.25" fill="currentColor"></circle>
          <circle cx="15" cy="10" r="1.25" fill="currentColor"></circle>
          <path d="M8 16c1.2-1 2.7-1.5 4-1.5S14.8 15 16 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/>
        </svg>
      </div>

      <!-- Código -->
      <p class="text-6xl sm:text-7xl lg:text-8xl font-extrabold tracking-tight text-slate-900">
        404
      </p>

      <!-- Título y descripción -->
      <h1 class="mt-2 text-2xl sm:text-3xl font-semibold text-slate-800">
        Ups… no encontramos esa página
      </h1>
      <p class="mt-2 text-slate-600">
        Lo sentimos, es como si esta dirección se hubiera perdido en la sublimación.  
        Puedes volver al inicio o contarnos qué estabas buscando.
      </p>

      <!-- Acciones -->
      <div class="mt-6 flex flex-col sm:flex-row items-center justify-center gap-3">
        <a
          routerLink="/"
          class="inline-flex items-center justify-center rounded-xl bg-blue-600 px-5 py-2.5 text-white font-semibold
                 hover:bg-blue-700 focus:outline-none focus-visible:ring-2 focus-visible:ring-blue-300"
          [attr.aria-label]="'Volver al inicio'"
        >
          Volver al inicio
        </a>
        <a
          routerLink="/contacto"
          class="inline-flex items-center justify-center rounded-xl border border-slate-300 bg-white px-5 py-2.5
                 text-slate-800 font-semibold hover:bg-slate-50 focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-300"
          [attr.aria-label]="'Contactar soporte'"
        >
          Contactar soporte
        </a>
      </div>

      <!-- Sugerencias rápidas -->
      <div class="mt-6 text-sm text-slate-500">
        O prueba en:
        <a routerLink="/catalogo" class="text-sky-700 hover:underline">Catálogo</a> ·
        <a routerLink="/about" class="text-sky-700 hover:underline">Conócenos</a> ·
        <a routerLink="/blog" class="text-sky-700 hover:underline">Blog / Guías</a>
      </div>
    </div>
  </div>

  <!-- Esquinas con “rasgadura” sutil (decorativo) -->
  <div class="pointer-events-none absolute left-0 top-0 h-24 w-24 bg-gradient-to-br from-white to-transparent opacity-70"></div>
  <div class="pointer-events-none absolute right-0 bottom-0 h-24 w-24 bg-gradient-to-tl from-white to-transparent opacity-70"></div>
</section>
