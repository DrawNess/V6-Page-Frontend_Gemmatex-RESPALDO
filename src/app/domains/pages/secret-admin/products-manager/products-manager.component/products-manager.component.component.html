<section class="w-full bg-white">
  <div class="mx-auto max-w-7xl px-4 py-6">
    <div class="flex items-center justify-between gap-3">
      <div>
        <h1 class="text-2xl sm:text-3xl font-extrabold text-blue-800">Productos</h1>
        <p class="text-slate-600">.</p>
      </div>
      <a [routerLink]="[base]" class="text-blue-700 hover:underline">‹ Volver al menú</a>
    </div>

    <!-- barra herramientas -->
    <div class="mt-4 flex flex-col sm:flex-row sm:items-center gap-3">
      <div class="relative w-full sm:max-w-sm">
        <input
          type="search"
          class="w-full rounded-xl border border-slate-300 px-3 py-2 pr-9 text-sm focus:border-blue-400 focus:ring-2 focus:ring-blue-200 outline-none"
          placeholder="Buscar por nombre, descripción o tag…"
          [value]="search()"
          (input)="onSearchInput($any($event.target).value)"
        />
        <span class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400">⌕</span>
      </div>

      <!-- Botón Agregar (deshabilitado si no hay POST) -->
      <button class="rounded-xl bg-slate-200 text-slate-600 px-4 py-2 text-sm font-semibold cursor-not-allowed"
              title="Pendiente: endpoint POST en API">
        + Agregar (pendiente)
      </button>
    </div>

    <!-- alerts -->
    <div class="mt-3 space-y-2">
      <div *ngIf="ok()" class="px-3 py-2 rounded-lg bg-emerald-50 text-emerald-800 border border-emerald-200 text-sm">{{ ok() }}</div>
      <div *ngIf="err()" class="px-3 py-2 rounded-lg bg-red-50 text-red-800 border border-red-200 text-sm">{{ err() }}</div>
    </div>

    <!-- tabla -->
    <div class="overflow-x-auto rounded-xl border border-slate-200">
        <table class="min-w-[720px] w-full text-sm">
            <thead class="bg-slate-50 text-slate-700">
            <tr>
                <th class="px-3 py-2 text-left">Img</th>
                <th class="px-3 py-2 text-left">Nombre</th>
                <th class="px-3 py-2 text-left">Precio</th>
<!--                 <th class="px-3 py-2 text-left">Stock</th> -->
                <!-- <th class="px-3 py-2 text-left">Activo</th> -->
                <th class="px-3 py-2 text-right">Acciones</th>
            </tr>
            </thead>
            <tbody>
            <!-- TU FILA -->
            <tr *ngFor="let p of filtered(); trackBy: trackById" class="border-b">
                <td class="px-3 py-2">
                <img [src]="p.imageUrl" [alt]="p.name" class="h-12 w-12 rounded object-cover border" loading="lazy">
                </td>
                <td class="px-3 py-2 font-medium text-slate-900">{{ p.name }}</td>
                <td class="px-3 py-2">{{ p.price | currency:'Bs. ':'symbol':'1.2-2' }}</td>
                <!-- <td class="px-3 py-2">{{ (p as any).stock ?? 0 }}</td> -->
                <td class="px-3 py-2">
                <!-- <span class="inline-flex items-center rounded-full px-2 py-0.5 text-xs"
                        [ngClass]="(p as any).is_active ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-slate-100 text-slate-500 border border-slate-200'">
                    {{ (p as any).is_active ? 'Sí' : 'No' }}
                </span> -->
                </td>
                <td class="px-3 py-2 text-right">
                <button class="rounded-lg border px-3 py-1 hover:bg-slate-50 mr-1" (click)="openEdit(p)">Editar</button>
                <!-- <button class="rounded-lg border px-3 py-1"
                        [ngClass]="(p as any).is_active ? 'border-red-300 text-red-700 hover:bg-red-50' : 'border-emerald-300 text-emerald-700 hover:bg-emerald-50'"
                        (click)="toggleActive(p)">
                    {{ (p as any).is_active ? 'Desactivar' : 'Activar' }}
                </button> -->
                </td>
            </tr>
            </tbody>
        </table>
    </div>

  </div>

  <!-- Modal edición (PATCH) -->
  <div *ngIf="showModal()" class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4" (click)="closeModal()">
    <div class="w-full max-w-2xl rounded-2xl bg-white shadow-xl p-4 sm:p-6" (click)="$event.stopPropagation()">
      <h3 class="text-lg font-semibold text-slate-900">Editar producto</h3>

      <form class="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-3" [formGroup]="form" (ngSubmit)="save()">
        <label class="block">
          <span class="text-sm text-slate-700">Nombre</span>
          <input type="text" class="mt-1 w-full rounded-lg border px-3 py-2" formControlName="name">
        </label>

        <label class="block">
          <span class="text-sm text-slate-700">Precio</span>
          <input type="number" step="0.01" class="mt-1 w-full rounded-lg border px-3 py-2" formControlName="price">
        </label>

        <label class="block">
          <span class="text-sm text-slate-700">Precio oferta</span>
          <input type="number" step="0.01" class="mt-1 w-full rounded-lg border px-3 py-2" formControlName="discountPrice">
        </label>

        <label class="block sm:col-span-2">
          <span class="text-sm text-slate-700">Imagen (URL)</span>
          <input type="url" class="mt-1 w-full rounded-lg border px-3 py-2" formControlName="imageUrl">
        </label>

        <label class="block">
          <span class="text-sm text-slate-700">Categoría (id)</span>
          <input type="number" class="mt-1 w-full rounded-lg border px-3 py-2" formControlName="category">
        </label>

        <label class="block">
          <span class="text-sm text-slate-700">Subcategoría</span>
          <input type="text" class="mt-1 w-full rounded-lg border px-3 py-2" formControlName="subcategory">
        </label>

        <!-- <label class="block">
          <span class="text-sm text-slate-700">Stock</span>
          <input type="number" class="mt-1 w-full rounded-lg border px-3 py-2" formControlName="stock">
        </label> -->

        <label class="block">
          <span class="text-sm text-slate-700">Activo</span>
          <select class="mt-1 w-full rounded-lg border px-3 py-2" formControlName="is_active">
            <option [ngValue]="true">Sí</option>
            <option [ngValue]="false">No</option>
          </select>
        </label>

        <label class="block sm:col-span-2">
          <span class="text-sm text-slate-700">Descripción corta</span>
          <input type="text" class="mt-1 w-full rounded-lg border px-3 py-2" formControlName="shortDescription">
        </label>

        <label class="block sm:col-span-2">
          <span class="text-sm text-slate-700">Descripción</span>
          <textarea rows="3" class="mt-1 w-full rounded-lg border px-3 py-2" formControlName="description"></textarea>
        </label>

        <label class="block sm:col-span-2">
          <span class="text-sm text-slate-700">Tags</span>
          <input type="text" class="mt-1 w-full rounded-lg border px-3 py-2" formControlName="tags" placeholder="ej: epson,fluor,kit">
        </label>

        <div class="sm:col-span-2 mt-2 flex items-center justify-end gap-2">
          <button type="button" class="rounded-lg border px-4 py-2 hover:bg-slate-50" (click)="closeModal()">Cancelar</button>
          <button type="submit" class="rounded-lg bg-blue-600 text-white px-4 py-2 font-semibold hover:bg-blue-700">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</section>
