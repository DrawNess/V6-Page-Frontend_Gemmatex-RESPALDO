<!-- HEADER -->
<section class="bg-white border-b border-slate-100">
  <div class="mx-auto max-w-5xl px-4 py-14 sm:py-20">
    <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold text-[#004ab1] leading-tight tracking-widest uppercase">
      Valores
    </h1>
    <p class="mt-4 text-slate-500 max-w-2xl text-base sm:text-lg leading-relaxed">
      Ocho principios que orientan cada relación, proyecto y decisión en GEMMATEX.
    </p>
  </div>
</section>

<!-- GRID DE VALORES -->
<section class="bg-white">
  <div class="mx-auto max-w-6xl px-4 py-14 sm:py-20">
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-6 md:gap-x-8 lg:gap-x-10 gap-y-8 items-stretch">
      @for (v of valores; track v.numero) {
        <article class="group relative rounded-2xl border border-slate-200 bg-white p-7 transition-all duration-300 hover:-translate-y-1 hover:shadow-[0_20px_40px_-20px_rgba(15,23,42,0.18)]">
          <svg class="val-border-svg pointer-events-none absolute inset-0 w-full h-full" preserveAspectRatio="none">
            <rect class="val-border-rect" x="0" y="0" width="100%" height="100%" rx="16" ry="16" pathLength="1"/>
          </svg>

          <h3 class="mt-4 text-lg sm:text-xl font-bold text-[#004ab1] text-center">{{ v.nombre }}</h3>
          <p class="mt-3 text-sm text-slate-500 leading-relaxed font-light">{{ v.descripcion }}</p>
        </article>
      }
    </div>
  </div>
</section>

<!-- FOOTER LINKS -->
<section class="bg-white border-t border-slate-100">
  <div class="mx-auto max-w-5xl px-4 py-12 sm:py-14">
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <p class="text-sm text-slate-500">¿Quieres conocer más sobre GEMMATEX?</p>
      <div class="flex flex-wrap gap-6 text-sm">
        <a routerLink="/empresa/sobre-nosotros"
           class="text-slate-900 underline-offset-4 hover:underline">
          Sobre nosotros
        </a>
        <a routerLink="/empresa/mision-vision"
           class="text-slate-900 underline-offset-4 hover:underline">
          Misión y visión
        </a>
      </div>
    </div>
  </div>
</section>
