<div class="admin-shell">

  <!-- ====== SIDEBAR ====== -->
  <aside class="admin-sidebar"
         [class.sidebar-open]="sidebarOpen()">

    <!-- Brand -->
    <div class="px-5 py-5 border-b border-slate-200">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-blue-600 flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 20 20">
            <path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z"/>
          </svg>
        </div>
        <div class="min-w-0">
          <p class="text-slate-900 font-bold text-sm truncate">Gemmatex</p>
          <p class="text-slate-500 text-xs truncate">Panel Admin</p>
        </div>
      </div>
    </div>

    <!-- User info -->
    <div class="px-5 py-4 border-b border-slate-200">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-blue-50 border border-blue-200 flex items-center justify-center flex-shrink-0">
          <svg class="w-4 h-4 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
        </div>
        <div class="min-w-0">
          <p class="text-slate-700 text-xs font-medium truncate">{{ adminEmail }}</p>
          <span class="inline-block px-1.5 py-0.5 rounded text-[10px] font-semibold bg-blue-100 text-blue-700 uppercase tracking-wide">
            {{ adminRole }}
          </span>
        </div>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="flex-1 overflow-y-auto py-4 px-3 space-y-6">
      <div *ngFor="let section of nav">
        <div class="flex items-center gap-2 px-2 mb-2">
          <svg class="w-3.5 h-3.5 text-slate-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="section.svgPath"/>
          </svg>
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{{ section.title }}</p>
        </div>

        <ul class="space-y-0.5">
          <li *ngFor="let item of section.items">
            <a [routerLink]="item.path"
               routerLinkActive="nav-link-active"
               [routerLinkActiveOptions]="{ exact: false }"
               class="nav-link"
               (click)="closeSidebar()">
              {{ item.label }}
            </a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Footer: ir al sitio + logout -->
    <div class="border-t border-slate-200 px-3 py-3 space-y-1">
      <a routerLink="/"
         class="nav-link"
         (click)="closeSidebar()">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
        </svg>
        Ver sitio
      </a>

      <button type="button"
              class="nav-link w-full text-left text-red-500 hover:bg-red-50 hover:text-red-600"
              (click)="logout()">
        <svg class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- Overlay móvil -->
  <div *ngIf="sidebarOpen()"
       class="sidebar-overlay"
       (click)="closeSidebar()"></div>

  <!-- ====== MAIN CONTENT ====== -->
  <div class="admin-main">

    <!-- Top bar (siempre visible en móvil, oculto en desktop) -->
    <header class="admin-topbar">
      <button type="button"
              class="p-2 rounded-lg text-slate-600 hover:bg-slate-100"
              (click)="toggleSidebar()">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <span class="font-semibold text-slate-800 text-sm">Gemmatex Admin</span>
      <div class="w-8"></div><!-- spacer -->
    </header>

    <!-- Página activa -->
    <main class="admin-content">
      <router-outlet />
    </main>
  </div>

</div>
