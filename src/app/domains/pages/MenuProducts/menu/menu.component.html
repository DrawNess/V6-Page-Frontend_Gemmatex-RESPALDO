<section class="max-w-6xl mx-auto px-4 py-8 sm:py-10">
  <!-- Encabezado -->
  <header class="mb-8">
    <div class="flex items-start justify-between gap-4">
      <div>
        <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-900">Panel Gemmatex (sin auth)</h1>
        <p class="text-slate-600">Accesos rápidos para crear y administrar catálogo y publicidad de la página principal.</p>
      </div>
      <a
        routerLink="/"
        class="inline-flex items-center gap-2 rounded-xl border px-3 py-2 bg-white hover:bg-slate-50 text-sm"
      >
        Volver al sitio
      </a>
    </div>

    <!-- Aviso -->
    <!-- <div class="mt-4 rounded-xl border border-amber-200 bg-amber-50 p-3 text-amber-800 text-sm">
      Este panel no tiene autenticación. Usa la ruta secreta sólo internamente.
    </div> -->
  </header>

  <!-- Grid principal -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
    <!-- Columna: Catálogo -->
    <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <h2 class="text-lg font-semibold text-slate-900 mb-4">Catálogo</h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <a
          *ngFor="let l of linksCatalog(); trackBy: trackByTo"
          [routerLink]="l.to"
          class="group rounded-2xl border border-slate-200 p-4 hover:shadow-md hover:border-blue-300 transition bg-white"
        >
          <div class="flex items-center justify-between">
            <h3 class="font-bold text-slate-900"> {{ l.label }}</h3>
            <span class="text-slate-400 group-hover:text-blue-500 transition">›</span>
          </div>
          <p class="mt-1 text-sm text-slate-600">{{ l.desc }}</p>
        </a>
      </div>
    </div>

    <!-- Columna: Publicidad home -->
    <div class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <h2 class="text-lg font-semibold text-slate-900 mb-4">Publicidad (home)</h2>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <a
          *ngFor="let l of linksAds(); trackBy: trackByTo"
          [routerLink]="l.to"
          class="group rounded-2xl border border-slate-200 p-4 hover:shadow-md hover:border-blue-300 transition bg-white"
        >
          <div class="flex items-center justify-between">
            <h3 class="font-bold text-slate-900"> {{ l.label }}</h3>
            <span class="text-slate-400 group-hover:text-blue-500 transition">›</span>
          </div>
          <p class="mt-1 text-sm text-slate-600">{{ l.desc }}</p>
        </a>
      </div>
    </div>
  </div>

  <!-- Accesos rápidos abajo (opcional) -->
  <div class="mt-8 flex flex-wrap gap-3">
    <a
      [routerLink]="linksAds()[1].to"
      class="inline-flex items-center rounded-lg border px-3 py-2 bg-white hover:bg-slate-50 text-sm"
    >Hero Slides</a>

    <a
      [routerLink]="linksAds()[2].to"
      class="inline-flex items-center rounded-lg border px-3 py-2 bg-white hover:bg-slate-50 text-sm"
    >Announcements</a>

    <a
      [routerLink]="linksAds()[3].to"
      class="inline-flex items-center rounded-lg border px-3 py-2 bg-white hover:bg-slate-50 text-sm"
    >Promos</a>
  </div>
</section>
