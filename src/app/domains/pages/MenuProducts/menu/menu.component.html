<section class="mx-auto max-w-7xl px-4 py-8 sm:py-10">
  <header class="mb-8 rounded-3xl border border-slate-200 bg-white/90 p-5 shadow-sm sm:p-6">
    <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
      <div class="space-y-2">
        <p class="text-xs font-semibold uppercase tracking-[0.18em] text-blue-600">Panel administrativo</p>
        <h1 class="text-3xl font-extrabold tracking-tight text-slate-900 sm:text-4xl">Menu de Gestion</h1>
        <p class="max-w-2xl text-sm text-slate-600 sm:text-base">
          Accesos organizados para catalogo, publicidad y administracion de usuarios.
        </p>
      </div>

      <div class="flex items-center gap-2 self-start">
        <button
          type="button"
          class="inline-flex items-center gap-2 rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-700 transition hover:border-slate-400 hover:text-slate-900"
          (click)="copySecretUrl()"
          title="Copiar URL del panel"
        >
          Copiar URL secreta
        </button>
        <a
          routerLink="/"
          class="inline-flex items-center gap-2 rounded-xl border border-slate-300 bg-white px-3 py-2 text-sm text-slate-700 transition hover:border-slate-400 hover:text-slate-900"
        >
          Volver al sitio
        </a>
      </div>
    </div>
  </header>

  <div class="grid grid-cols-1 gap-6 lg:grid-cols-3">
    <section *ngFor="let section of sections; trackBy: trackBySection" class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <header class="mb-4">
        <h2 class="text-lg font-semibold text-slate-900">{{ section.title }}</h2>
        <p class="mt-1 text-sm text-slate-600">{{ section.caption }}</p>
      </header>

      <div class="grid grid-cols-1 gap-3">
        <a
          *ngFor="let l of section.links; trackBy: trackByTo"
          [routerLink]="l.to"
          class="group relative rounded-2xl border border-slate-200 bg-white p-4 transition hover:-translate-y-0.5 hover:border-blue-300 hover:shadow-md"
        >
          <span
            class="absolute inset-x-0 top-0 h-1 rounded-t-2xl bg-gradient-to-r from-[#0511F2] via-[#12509B] to-[#0511F2] opacity-0 transition group-hover:opacity-100"
          ></span>

          <div class="flex items-start justify-between gap-3">
            <div class="flex items-start gap-3">
              <div class="grid h-10 w-10 place-items-center rounded-xl border border-blue-100 bg-blue-50">
                <ng-container [ngSwitch]="l.icon">
                  <svg *ngSwitchCase="'grid'" class="h-5 w-5 text-[#0511F2]" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm10 0h8v8h-8v-8z"/></svg>
                  <svg *ngSwitchCase="'layers'" class="h-5 w-5 text-[#0511F2]" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l10 6-10 6L2 8l10-6zm0 15l7.5-4.5L22 14l-10 6-10-6 2.5-1.5L12 17z"/></svg>
                  <svg *ngSwitchCase="'box'" class="h-5 w-5 text-[#0511F2]" viewBox="0 0 24 24" fill="currentColor"><path d="M21 8l-9-5-9 5 9 5 9-5zm-9 7l-9-5v6l9 5 9-5v-6l-9 5z"/></svg>
                  <svg *ngSwitchCase="'megaphone'" class="h-5 w-5 text-[#0511F2]" viewBox="0 0 24 24" fill="currentColor"><path d="M21 7l-7 4v6l7-4V7zM3 8h9v8H3l2-4-2-4z"/></svg>
                  <svg *ngSwitchCase="'image'" class="h-5 w-5 text-[#0511F2]" viewBox="0 0 24 24" fill="currentColor"><path d="M21 19H3V5h18v14zM8.5 13.5l2.5 3 3.5-4.5 4.5 6H5l3.5-4.5zM9 7a2 2 0 110 4 2 2 0 010-4z"/></svg>
                  <svg *ngSwitchCase="'tags'" class="h-5 w-5 text-[#0511F2]" viewBox="0 0 24 24" fill="currentColor"><path d="M10 3l9 9-7 7-9-9V3h7zm2.5 3.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3z"/></svg>
                  <svg *ngSwitchCase="'ticket'" class="h-5 w-5 text-[#0511F2]" viewBox="0 0 24 24" fill="currentColor"><path d="M4 7a2 2 0 012-2h12a2 2 0 012 2v3a2 2 0 000 4v3a2 2 0 01-2 2H6a2 2 0 01-2-2v-3a2 2 0 000-4V7zm5 1v8h2V8H9zm4 0v8h2V8h-2z"/></svg>
                  <svg *ngSwitchCase="'users'" class="h-5 w-5 text-[#0511F2]" viewBox="0 0 24 24" fill="currentColor"><path d="M16 11a4 4 0 10-3.999-4A4 4 0 0016 11zm-8 0a3 3 0 10-3-3 3 3 0 003 3zm8 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4zM8 13c-.29 0-.62.02-.97.05C4.28 13.3 2 14.29 2 16.5V19h5v-2c0-1.17.58-2.18 1.57-3-.21-.01-.39-.02-.57-.02z"/></svg>
                  <svg *ngSwitchCase="'receipt'" class="h-5 w-5 text-[#0511F2]" viewBox="0 0 24 24" fill="currentColor"><path d="M7 3h10a2 2 0 012 2v16l-3-1.5L12 21l-4-1.5L5 21V5a2 2 0 012-2zm2 4v2h6V7H9zm0 4v2h6v-2H9z"/></svg>
                </ng-container>
              </div>
              <div>
                <h3 class="font-bold leading-tight text-slate-900">{{ l.label }}</h3>
                <p class="mt-0.5 text-sm text-slate-600">{{ l.desc }}</p>
              </div>
            </div>
            <span class="shrink-0 text-slate-400 transition group-hover:text-blue-600">›</span>
          </div>
        </a>
      </div>
    </section>
  </div>
</section>
