<section class="max-w-7xl mx-auto px-4 py-8 sm:py-10">

  <!-- Header / barra superior -->
  <header class="mb-8">
    <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
      <div class="space-y-2">
        <div>
          <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold tracking-tight
                     bg-clip-text text-blue-600">
            Menú de Productos
          </h1>
        </div>
      </div>

      <div class="flex items-center gap-2">
        <button
          type="button"
          class="inline-flex items-center gap-2 rounded-xl border px-3 py-2 bg-white hover:bg-slate-50 text-sm"
          (click)="copySecretUrl()"
          title="Copiar URL secreta">
          Copiar URL secreta
        </button>
        <a routerLink="/"
           class="inline-flex items-center gap-2 rounded-xl border px-3 py-2 bg-white hover:bg-slate-50 text-sm">
          Volver al sitio
        </a>
      </div>
    </div>
  </header>

  <!-- Bloques -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

    <!-- Catálogo -->
    <section class="relative rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <header class="mb-4 flex items-center justify-between">
        <h2 class="text-lg font-semibold text-slate-900 flex items-center gap-2">
          <span class="inline-block h-2 w-2 rounded-full bg-[#0511F2]"></span>
          Catálogo
        </h2>
      </header>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <a
          *ngFor="let l of linksCatalog(); trackBy: trackByTo"
          [routerLink]="l.to"
          class="group relative rounded-2xl border border-slate-200 bg-white p-4
                 hover:shadow-md hover:border-blue-300 transition"
        >
          <!-- top accent -->
          <span class="absolute inset-x-0 top-0 h-1 rounded-t-2xl bg-gradient-to-r from-[#0511F2] via-[#12509B] to-[#0511F2] opacity-0 group-hover:opacity-100 transition"></span>

          <div class="flex items-start justify-between gap-3">
            <div class="flex items-center gap-3">
              <div class="h-10 w-10 rounded-xl bg-blue-50 border border-blue-100 grid place-items-center">
                <!-- icon -->
                <ng-container [ngSwitch]="l.icon">
                  <svg *ngSwitchCase="'grid'" class="h-5 w-5 text-[#0511F2]" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm10 0h8v8h-8v-8z"/></svg>
                  <svg *ngSwitchCase="'layers'" class="h-5 w-5 text-[#0511F2]" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l10 6-10 6L2 8l10-6zm0 15l7.5-4.5L22 14l-10 6-10-6 2.5-1.5L12 17z"/></svg>
                  <svg *ngSwitchCase="'box'" class="h-5 w-5 text-[#0511F2]" viewBox="0 0 24 24" fill="currentColor"><path d="M21 8l-9-5-9 5 9 5 9-5zm-9 7l-9-5v6l9 5 9-5v-6l-9 5z"/></svg>
                </ng-container>
              </div>
              <div>
                <h3 class="font-bold text-slate-900 leading-tight">{{ l.label }}</h3>
                <p class="mt-0.5 text-sm text-slate-600">{{ l.desc }}</p>
              </div>
            </div>
            <span class="shrink-0 text-slate-400 group-hover:text-blue-600 transition">›</span>
          </div>
        </a>
      </div>
    </section>

    <!-- Publicidad -->
    <section class="relative rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
      <header class="mb-4 flex items-center justify-between">
        <h2 class="text-lg font-semibold text-slate-900 flex items-center gap-2">
          <span class="inline-block h-2 w-2 rounded-full bg-[#0511F2]"></span>
          Publicidad
        </h2>
      </header>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <a
          *ngFor="let l of linksAds(); trackBy: trackByTo"
          [routerLink]="l.to"
          class="group relative rounded-2xl border border-slate-200 bg-white p-4
                 hover:shadow-md hover:border-blue-300 transition"
        >
          <!-- top accent -->
          <span class="absolute inset-x-0 top-0 h-1 rounded-t-2xl bg-gradient-to-r from-[#0511F2] via-[#12509B] to-[#0511F2] opacity-0 group-hover:opacity-100 transition"></span>

          <div class="flex items-start justify-between gap-3">
            <div class="flex items-center gap-3">
              <div class="h-10 w-10 rounded-xl bg-blue-50 border border-blue-100 grid place-items-center">
                <!-- icon -->
                <ng-container [ngSwitch]="l.icon">
                  <svg *ngSwitchCase="'megaphone'" class="h-5 w-5 text-[#0511F2]" viewBox="0 0 24 24" fill="currentColor"><path d="M21 7l-7 4v6l7-4V7zM3 8h9v8H3l2-4-2-4z"/></svg>
                  <svg *ngSwitchCase="'image'" class="h-5 w-5 text-[#0511F2]" viewBox="0 0 24 24" fill="currentColor"><path d="M21 19H3V5h18v14zM8.5 13.5l2.5 3 3.5-4.5 4.5 6H5l3.5-4.5zM9 7a2 2 0 110 4 2 2 0 010-4z"/></svg>
                  <svg *ngSwitchCase="'tags'" class="h-5 w-5 text-[#0511F2]" viewBox="0 0 24 24" fill="currentColor"><path d="M10 3l9 9-7 7-9-9V3h7zm2.5 3.5a1.5 1.5 0 100 3 1.5 1.5 0 000-3z"/></svg>
                </ng-container>
              </div>
              <div>
                <h3 class="font-bold text-slate-900 leading-tight">{{ l.label }}</h3>
                <p class="mt-0.5 text-sm text-slate-600">{{ l.desc }}</p>
              </div>
            </div>
            <span class="shrink-0 text-slate-400 group-hover:text-blue-600 transition">›</span>
          </div>
        </a>
      </div>
    </section>
  </div>

</section>
