<!-- src/app/pages/productos/productos.component.html -->
<section class="w-full">
  <div class="mx-auto w-full max-w-7xl px-4 py-8">

    <!-- Título + búsqueda -->
    <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
      <h1 class="text-2xl font-extrabold text-slate-900">Productos</h1>

      <div class="relative w-full md:max-w-xl">
        <input
          type="search"
          class="w-full rounded-lg border border-slate-300 bg-white/90 px-4 py-2.5 pr-10 text-sm outline-none
                 focus:border-blue-400 focus:ring-2 focus:ring-blue-200"
          placeholder="Buscar por nombre, descripción o tag…"
          [value]="search()"
          (input)="onSearch($event)"
        />
        <button
          type="button"
          class="absolute right-2 top-1/2 -translate-y-1/2 rounded-md px-2 py-1 text-slate-500 hover:bg-slate-100"
          *ngIf="search()"
          (click)="clearSearch()"
          aria-label="Limpiar búsqueda"
        >✕</button>
      </div>
    </div>

    <!-- Estado -->
    <div *ngIf="loading()" class="py-10 text-center text-slate-500">Cargando…</div>
    <div *ngIf="!loading() && error()" class="py-10 text-center text-red-600">{{ error() }}</div>

    <div *ngIf="!loading() && !error()" class="mt-6 grid grid-cols-12 gap-6">
      <!-- Sidebar: subcategorías -->
      <aside class="col-span-12 md:col-span-3">
        <div class="rounded-2xl border border-slate-200 bg-white p-4 sticky top-24 space-y-3">
          <div class="flex items-center justify-between">
            <h3 class="text-lg font-semibold text-slate-900">Subcategorías</h3>
            <button class="text-xs text-slate-500 hover:underline" (click)="clearSubs()">Limpiar</button>
          </div>

          <div class="text-xs text-slate-500 px-1">
            <span class="font-semibold text-slate-800">Categoría:</span>
            {{ currentCategory() || '—' }}
          </div>

          <div class="mt-3 space-y-2 max-h-[60vh] overflow-y-auto pr-1">
            <button
              *ngFor="let s of subcategories(); trackBy: trackBySub"
              type="button"
              class="w-full flex items-center justify-between rounded-lg border px-3 py-2
                     transition hover:bg-slate-50"
              [ngClass]="isSubActive(s.id) ? 'border-blue-300 bg-blue-50 text-blue-800' : 'border-slate-200 text-slate-800'"
              (click)="toggleSub(s.id)"
            >
              <span class="text-sm font-medium">{{ s.name }}</span>
              <span class="text-xs rounded-full px-2 py-0.5 border"
                    [ngClass]="(subCounts().get(s.id) ?? 0) > 0 ? 'bg-slate-50 text-slate-700 border-slate-200' : 'bg-slate-100 text-slate-400 border-slate-200'">
                {{ subCounts().get(s.id) ?? 0 }}
              </span>
            </button>
          </div>
        </div>
      </aside>

      <!-- Lista de productos -->
      <div class="col-span-12 md:col-span-9">
        <div class="mb-3 text-sm text-slate-600">
          Resultados: <strong>{{ groupedProducts().length }}</strong>
          <span *ngIf="isInkCategory()" class="text-xs text-slate-500 ml-2">(agrupados por modelo de tinta)</span>
        </div>

        <div class="grid gap-5 sm:gap-6 grid-cols-1 sm:grid-cols-2 md:grid-cols-3 xl:grid-cols-4">
          <app-product
            *ngFor="let p of groupedProducts(); trackBy: trackByProduct"
            [product]="p"
          ></app-product>
        </div>

        <div *ngIf="groupedProducts().length === 0" class="mt-10 text-center text-slate-500">
          Sin resultados. Prueba otra subcategoría o búsqueda.
        </div>
      </div>
    </div>
  </div>
</section>
