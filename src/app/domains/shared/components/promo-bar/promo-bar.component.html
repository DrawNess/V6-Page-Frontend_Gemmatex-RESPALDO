<section
  class="sticky bottom-0 z-[40] w-full
         bg-[#1E2041]/95 text-white backdrop-blur
         border-t border-white/10 shadow-[0_-10px_30px_-15px_rgba(0,0,0,0.5)]"
>
  <div class="mx-auto max-w-7xl px-4">
    <div class="h-9 sm:h-10 flex items-center justify-center">
      <p class="font-extrabold tracking-wide text-center text-[10px] sm:text-xs md:text-sm leading-tight">
        <ng-container *ngFor="let ch of chars; let i = index">
          <span
            class="align-middle select-none opacity-0 translate-y-2 transition-all ease-out will-change-transform will-change-opacity"
            [style.transitionDuration.ms]="animate ? 550 : 0"
            [style.transitionDelay.ms]="animate ? i * 25 : 0"
            [ngClass]="{ 'opacity-100 translate-y-0': animate }"
            [class.w-2]="ch === ' '"
            [class.sm:w-3]="ch === ' '"
          >
            {{ ch === ' ' ? '\u00A0' : ch }}
          </span>
        </ng-container>
      </p>
    </div>
  </div>
</section>
