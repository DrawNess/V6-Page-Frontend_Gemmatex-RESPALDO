<footer class="footer-container relative text-white overflow-hidden">
  <!-- Contenido principal -->
  <div class="relative z-10 py-16 lg:py-20">
    <div class="container mx-auto px-4 lg:px-6">

      <!-- Grid principal -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-12">

        <!-- Logo y descripción -->
        <div class="footer-section flex flex-col items-center lg:items-start gap-6">
          <a href="" class="logo-container inline-block">
            <img
              [src]="logoUrl"
              alt="Logo Gemmatex"
              class="w-60 max-w-full"
            >
          </a>
        </div>

        <!-- Sucursales -->
        <div class="footer-section">
          <h3 class="footer-title">Sucursales</h3>
          <ul class="space-y-5">
            <li *ngFor="let location of locations; let i = index"
                class="location-item flex items-start gap-3.5"
                [style.animation-delay.s]="(i + 1) * 0.1">
              <div class="icon-wrapper flex-shrink-0 w-5 h-5 relative">
                <img [src]="locationIcon"
                     [alt]="'Ubicación ' + location.name"
                     class="w-full h-full object-contain">
              </div>
              <a [href]="location.mapUrl"
                 class="footer-link text-white/90 hover:text-[#A9C5FF] transition-colors leading-relaxed"
                 target="_blank"
                 rel="noopener">
                <strong class="font-semibold">{{ location.name }}:</strong> {{ location.address }}
              </a>
            </li>
          </ul>
        </div>

        <!-- Contactos -->
        <div class="footer-section">
          <h3 class="footer-title">Contactos</h3>
          <div class="space-y-5">

            <!-- Email -->
            <div class="contact-box rounded-xl p-5 bg-white/[0.04] border border-white/[0.08] hover:bg-white/[0.06] hover:border-[#A9C5FF]/20 transition-all duration-300 hover:-translate-y-0.5">
              <span class="contact-label block text-xs uppercase tracking-wider font-semibold mb-2">
                Email
              </span>
              <a [href]="'mailto:' + email"
                 class="footer-link text-white/85 text-sm">
                {{ email }}
              </a>
            </div>

            <!-- Teléfonos -->
            <div class="contact-box rounded-xl p-5 bg-white/[0.04] border border-white/[0.08] hover:bg-white/[0.06] hover:border-[#A9C5FF]/20 transition-all duration-300 hover:-translate-y-0.5">
              <span class="contact-label block text-xs uppercase tracking-wider font-semibold mb-3">
                Teléfonos
              </span>
              <div class="space-y-2 text-sm text-white/85">
                <div *ngFor="let phone of phones">
                  <strong class="text-white">{{ phone.city }}:</strong>
                  <a [href]="phone.link"
                     class="footer-link hover:text-[#A9C5FF] transition-colors ml-1">
                    {{ phone.number }}
                  </a>
                </div>
              </div>
            </div>

          </div>
        </div>

        <!-- Trabajamos con -->
        <div class="footer-section">
          <h3 class="footer-title">Trabajamos con</h3>
          <div class="flex flex-col items-center gap-6">
            <a href="#" class="partner-logo inline-block transition-all duration-400 hover:-translate-y-1 hover:scale-105">
              <img
                [src]="epsonLogo"
                alt="EPSON"
                class="w-[100px] h-auto block"
              >
            </a>
          </div>
        </div>

      </div>

      <!-- Divider -->
      <div class="footer-divider h-px bg-gradient-to-r from-transparent via-white/20 to-transparent my-10"></div>

      <!-- Redes sociales y copyright -->
      <div class="flex flex-col items-center gap-8">

        <!-- Redes sociales -->
        <div class="flex gap-5 flex-wrap justify-center">
          <a *ngFor="let social of socialLinks"
             [href]="social.url"
             class="social-link w-12 h-12 rounded-full flex items-center justify-center bg-white/[0.08] border border-white/10 hover:bg-white/[0.15] hover:border-[#A9C5FF]/40 transition-all duration-400 hover:-translate-y-1 hover:scale-110"
             target="_blank"
             rel="noopener"
             [attr.aria-label]="social.ariaLabel">
            <img [src]="social.icon"
                 [alt]="social.name"
                 class="w-6 h-6 object-contain">
          </a>
        </div>

        <!-- Copyright -->
        <p class="copyright text-center text-sm text-white/60 font-light tracking-wide">
          © Copyright Gemmatex {{ currentYear }} • Todos los derechos reservados
        </p>

      </div>

    </div>
  </div>
</footer>
