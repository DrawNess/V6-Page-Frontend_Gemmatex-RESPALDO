<aside class="sidebar"
       [class.collapsed]="collapsed()"
       [class.mobile-open]="mobileOpen()">

  <!-- Brand -->
  <div class="sidebar-brand">
    <div class="flex items-center gap-3 min-w-0">
      <div class="label-text min-w-0">
        <p class="text-slate-900 font-bold text-sm truncate">Gemmatex</p>
        <p class="text-slate-400 text-[10px] truncate">Panel Admin</p>
      </div>
    </div>
  </div>

  <!-- User info -->
  <div class="sidebar-user">
    <div class="user-avatar">
      <svg class="w-4 h-4 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
    </div>
    <div class="label-text min-w-0">
      <p class="text-slate-700 text-xs font-medium truncate">{{ adminEmail }}</p>
      <span class="inline-block px-1.5 py-0.5 rounded text-[10px] font-semibold bg-blue-100 text-blue-700 uppercase tracking-wide">
        {{ adminRole }}
      </span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <div *ngFor="let section of nav" class="nav-section">
      <!-- Section header -->
      <div class="section-header">
        <svg class="w-3.5 h-3.5 text-slate-400 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="section.svgPath"/>
        </svg>
        <span class="label-text text-[10px] font-bold text-slate-400 uppercase tracking-widest">{{ section.title }}</span>
      </div>

      <!-- Items -->
      <ul class="space-y-0.5">
        <li *ngFor="let item of section.items">
          <a [routerLink]="item.path"
             routerLinkActive="nav-link-active"
             [routerLinkActiveOptions]="{ exact: false }"
             class="nav-link"
             [title]="item.label"
             (click)="closeSidebar()">
            <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
              <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon"/>
            </svg>
            <span class="label-text">{{ item.label }}</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <a routerLink="/"
       class="nav-link"
       title="Ver sitio"
       (click)="closeSidebar()">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      <span class="label-text">Ver sitio</span>
    </a>

    <button type="button"
            class="nav-link text-red-500 hover:bg-red-50 hover:text-red-600"
            title="Cerrar sesion"
            (click)="logout()">
      <svg class="nav-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.75">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      <span class="label-text">Cerrar sesion</span>
    </button>
  </div>
</aside>

<!-- Overlay movil -->
@if (mobileOpen()) {
  <div class="sidebar-overlay" (click)="closeSidebar()"></div>
}
