<div class="admin-shell" [class.sidebar-collapsed]="collapsed()">

  <!-- Sidebar -->
  <app-admin-sidebar
    [collapsed]="collapsed()"
    [mobileOpen]="mobileOpen()"
    (toggled)="toggleCollapse()"
    (closed)="closeMobile()" />

  <!-- ====== MAIN CONTENT ====== -->
  <div class="admin-main">

    <!-- Top bar - siempre visible -->
    <header class="sticky top-0 z-20 flex items-center px-4 py-2.5 bg-white border-b border-slate-200 shadow-sm">
      <div class="flex items-center gap-3">
        <!-- Hamburger movil -->
        <button type="button"
                class="lg:hidden w-9 h-9 rounded-lg flex items-center justify-center text-slate-500 hover:bg-slate-100 hover:text-slate-900 transition-colors"
                (click)="toggleMobile()">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <!-- Toggle desktop -->
        <button type="button"
                class="hidden lg:flex w-9 h-9 rounded-lg items-center justify-center text-slate-500 hover:bg-slate-100 hover:text-slate-900 transition-colors"
                (click)="toggleCollapse()">
          <svg class="w-5 h-5 transition-transform" [class.rotate-180]="collapsed()"
               fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Pagina activa -->
    <main class="admin-content">
      <router-outlet />
    </main>
  </div>

</div>
