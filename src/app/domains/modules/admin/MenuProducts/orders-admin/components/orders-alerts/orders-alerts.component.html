<div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">

  <button (click)="collapsed.set(!collapsed())"
          class="w-full px-5 py-3.5 flex items-center justify-between hover:bg-slate-50 transition-colors">
    <div class="flex items-center gap-3">
      <div class="relative">
        <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
        </svg>
        @if (dangerAlertCount() > 0) {
          <span class="absolute -top-1 -right-1 w-3 h-3 rounded-full bg-red-500 animate-pulse border-2 border-white"></span>
        }
      </div>
      <span class="font-semibold text-slate-800">Centro de Alertas</span>
      <span class="text-xs font-bold px-2 py-0.5 rounded-full"
            [class]="dangerAlertCount() > 0 ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-600'">
        {{ alerts().length }}
      </span>
    </div>
    <svg class="w-5 h-5 text-slate-400 transition-transform" [class.rotate-180]="!collapsed()"
         fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
    </svg>
  </button>

  @if (!collapsed()) {
    <div class="px-5 pb-5 space-y-3 animate-slide-in">
      @for (alert of alerts(); track alert.status + alert.level) {
        <div class="rounded-xl border-2 p-4" [ngClass]="[alert.borderColor, alert.bgColor]">
          <div class="flex items-start gap-3">

            <div class="w-9 h-9 rounded-lg flex items-center justify-center shrink-0" [ngClass]="alert.bgColor">
              <svg class="w-5 h-5" [ngClass]="alert.iconColor" [class.animate-pulse]="alert.pulse"
                   fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="alert.icon"/>
              </svg>
            </div>

            <div class="flex-1 min-w-0">
              <h4 class="font-bold text-sm" [ngClass]="alert.textColor">{{ alert.label }}</h4>
              <p class="text-xs mt-0.5 opacity-80" [ngClass]="alert.textColor">{{ alert.message }}</p>

              @if (alert.orders.length <= 8) {
                <div class="mt-2 flex flex-wrap gap-1.5">
                  @for (o of alert.orders; track o.id) {
                    <button (click)="goToOrder.emit({ status: alert.status, orderId: o.id })"
                            class="inline-flex items-center gap-1 px-2.5 py-1 rounded-lg text-[11px] font-semibold transition-colors hover:opacity-80"
                            [ngClass]="alert.bgColor" [class]="alert.textColor">
                      #{{ o.id }}
                      <span class="opacity-60">{{ timeAgo(o.updatedAt ?? o.createdAt) }}</span>
                    </button>
                  }
                </div>
              } @else {
                <p class="mt-1.5 text-xs font-semibold opacity-70" [ngClass]="alert.textColor">
                  {{ alert.orders.length }} pedidos afectados
                </p>
              }
            </div>

            @if (alert.pulse) {
              <span class="shrink-0 inline-flex items-center gap-1 px-2 py-1 rounded-full text-[10px] font-bold bg-red-600 text-white">
                <span class="w-1.5 h-1.5 rounded-full bg-white animate-pulse"></span>
                URGENTE
              </span>
            }

          </div>
        </div>
      }
    </div>
  }

</div>
