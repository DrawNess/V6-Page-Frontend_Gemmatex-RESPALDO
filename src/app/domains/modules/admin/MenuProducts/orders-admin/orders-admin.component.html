<!-- Toast -->
@if (toast(); as t) {
  <div class="fixed top-4 right-4 z-50 flex items-center gap-2 px-5 py-3 rounded-xl shadow-lg text-sm font-medium animate-modal-in"
       [class]="t.type === 'ok' ? 'bg-emerald-600 text-white' : t.type === 'warn' ? 'bg-amber-500 text-white' : 'bg-red-600 text-white'">
    @if (t.type === 'ok') {
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
      </svg>
    } @else {
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4.832c-.77-.833-2.694-.833-3.464 0L3.34 16.5c-.77.833.192 2.5 1.732 2.5z"/>
      </svg>
    }
    {{ t.msg }}
  </div>
}

<!-- Modal de cambio de estado -->
@if (modalOrder(); as order) {
  <app-orders-status-modal
    [order]="order"
    [saving]="saving()"
    (confirmed)="saveStatus($event)"
    (cancelled)="closeModal()" />
}

<div class="orders-shell">

  <!-- Barra de comandos: título + filtros de estado -->
  <app-orders-command-bar
    [counts]="statusCounts()"
    [activeStatus]="statusTab()"
    [loading]="loading()"
    [totalOrders]="totalOrders()"
    (filterChange)="setTab($event)"
    (refreshRequested)="refresh()" />

  <!-- Panel split: lista izquierda · detalle derecha -->
  <div class="orders-split">

    <app-orders-master
      [orders]="orders()"
      [loading]="loading()"
      [selectedOrderId]="selectedOrder()?.id ?? null"
      [now]="now()"
      (orderSelected)="selectedOrder.set($event)" />

    <app-orders-detail
      [order]="selectedOrder()"
      [now]="now()"
      (openStatusModal)="openModal($event)" />

  </div>

</div>
