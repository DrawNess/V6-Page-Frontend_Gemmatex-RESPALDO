<section class="min-h-[80vh] w-full bg-slate-50">
  <div class="mx-auto max-w-6xl px-4 py-10">
    <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-900">Panel privado</h1>
    <p class="text-slate-600 mt-1">Ruta oculta sin login (temporal     aaaaaa).</p>

    <div class="mt-8 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
      <!-- Productos -->
      <a [routerLink]="[base, 'panel-productos']"
         class="group rounded-2xl border border-slate-200 bg-white p-6 hover:shadow-lg transition block">
        <div class="text-xl font-semibold text-slate-900">Productos</div>
        <p class="text-slate-600 mt-1"></p>
        <div class="mt-4 inline-flex items-center gap-1 text-blue-700 group-hover:gap-2 transition">
          Entrar <span>›</span>
        </div>
      </a>

      <!-- Puedes añadir más tarjetas luego (categorías, banners, etc.) -->
      <div class="rounded-2xl border border-slate-200 bg-white p-6 opacity-60">
        <div class="text-xl font-semibold text-slate-900">Categorías (Pendiente.)</div>
        <p class="text-slate-600 mt-1"></p>
      </div>
    </div>
  </div>
</section>
