<main class="mx-auto w-full max-w-4xl px-4 py-8">
  <section class="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
    <div class="flex flex-wrap items-center justify-between gap-3">
      <div>
        <p class="text-sm text-slate-500">Mi cuenta</p>
        <h1 class="text-2xl font-bold text-slate-900">Información de cuenta</h1>
      </div>

      <a
        [routerLink]="accountPath"
        class="rounded-xl border border-slate-300 px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-100"
      >
        Volver
      </a>
    </div>

    @if (loading) {
      <p class="mt-4 text-sm text-slate-600">Cargando información...</p>
    }

    @if (errorMsg) {
      <div class="mt-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">
        {{ errorMsg }}
      </div>
    }

    @if (successMsg) {
      <div class="mt-4 rounded-xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-sm text-emerald-800">
        {{ successMsg }}
      </div>
    }

    <form class="mt-6 grid gap-4 md:grid-cols-2" [formGroup]="form" (ngSubmit)="saveChanges()">
      <label class="block text-sm text-slate-700 md:col-span-2">
        Correo
        <input
          type="email"
          class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-2.5 outline-none focus:border-slate-400 focus:ring-4 focus:ring-slate-100"
          formControlName="email"
        />
      </label>

      <label class="block text-sm text-slate-700">
        Nombre
        <input
          type="text"
          class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-2.5 outline-none focus:border-slate-400 focus:ring-4 focus:ring-slate-100"
          formControlName="name"
        />
      </label>

      <label class="block text-sm text-slate-700">
        Apellido
        <input
          type="text"
          class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-2.5 outline-none focus:border-slate-400 focus:ring-4 focus:ring-slate-100"
          formControlName="lastName"
        />
      </label>

      <label class="block text-sm text-slate-700 md:col-span-2">
        Teléfono
        <input
          type="tel"
          class="mt-1 w-full rounded-xl border border-slate-200 px-3 py-2.5 outline-none focus:border-slate-400 focus:ring-4 focus:ring-slate-100"
          formControlName="phone"
        />
      </label>

      <div class="md:col-span-2 flex flex-wrap gap-3">
        <button
          type="submit"
          class="rounded-xl bg-blue-600 px-5 py-2.5 text-sm font-semibold text-white hover:bg-blue-700 disabled:opacity-60"
          [disabled]="saving || loading"
        >
          {{ saving ? 'Guardando...' : 'Guardar cambios' }}
        </button>

        <button
          type="button"
          class="rounded-xl border border-slate-300 px-5 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-100 disabled:opacity-60"
          (click)="sendPasswordRecovery()"
          [disabled]="passwordLoading"
        >
          {{ passwordLoading ? 'Enviando...' : 'Cambiar contraseña' }}
        </button>
      </div>
    </form>

    @if (passwordMsg) {
      <p class="mt-4 text-sm text-slate-700">{{ passwordMsg }}</p>
    }
  </section>
</main>
