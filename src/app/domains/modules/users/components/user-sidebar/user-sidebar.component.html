<!-- ── Trigger bar (móvil, en flujo del grid) ────────────── -->
<div class="lg:hidden flex items-center justify-between rounded-2xl bg-white shadow-sm px-4 py-3.5 mb-1">
  <div class="flex items-center gap-3 min-w-0">
    <!-- <div class="flex h-10 w-10 flex-shrink-0 items-center justify-center rounded-full bg-blue-500 text-white">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
    </div> -->
    <div class="min-w-0">
      <p class="text-[14px] font-semibold text-slate-900 truncate leading-snug">{{ getFullName() }}</p>
      <p class="text-[12px] text-slate-400 truncate leading-snug">{{ user?.email || '—' }}</p>
    </div>
  </div>
  <button type="button"
          class="flex-shrink-0 ml-3 flex items-center gap-1.5 rounded-xl bg-slate-100 px-3 py-2 text-[13px] font-medium text-slate-700 hover:bg-slate-200 transition-colors"
          (click)="open()">
    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
    Menú
  </button>
</div>

<!-- ── Backdrop (móvil) ──────────────────────────────────── -->
<div *ngIf="isOpen"
     class="fixed inset-0 z-40 bg-black/40 backdrop-blur-sm lg:hidden"
     (click)="close()">
</div>

<!-- ── Drawer / Sidebar ──────────────────────────────────── -->
<aside class="fixed top-0 left-0 h-full w-72 z-50 bg-white shadow-2xl
              flex flex-col overflow-y-auto
              transition-transform duration-300 ease-in-out
              lg:sticky lg:top-6 lg:h-auto lg:w-full lg:z-auto
              lg:shadow-sm lg:rounded-2xl lg:overflow-hidden
              lg:translate-x-0"
       [class.-translate-x-full]="!isOpen">

  <!-- Profile -->
  <div class="flex items-center gap-4 px-6 py-6 border-b border-slate-100">
    <!-- <div class="flex h-14 w-14 flex-shrink-0 items-center justify-center rounded-full bg-blue-500 text-white">
      <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.6">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
      </svg>
    </div> -->
    <div class="min-w-0 flex-1">
      <p class="text-[16px] font-semibold text-slate-900 leading-snug truncate">{{ getFullName() }}</p>
      <p class="text-[13px] text-slate-400 truncate leading-snug mt-0.5">{{ user?.email || '—' }}</p>
    </div>
    <!-- Close button (solo móvil) -->
    <button type="button"
            class="lg:hidden flex-shrink-0 flex items-center justify-center h-8 w-8 rounded-full bg-slate-100 text-slate-500 hover:bg-slate-200 transition-colors"
            (click)="close()">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Nav -->
  <nav class="flex-1 divide-y divide-slate-100">
    <button
      *ngFor="let item of navItems"
      type="button"
      [routerLink]="item.path"
      class="group w-full flex items-center justify-between min-h-[62px] pr-5 transition-colors"
      [ngClass]="isActive(item.path)
        ? 'border-l-2 border-blue-500 pl-[22px] bg-blue-50/70'
        : 'pl-6 hover:bg-slate-50'"
    >
      <div>
        <p class="text-[15px] font-medium leading-snug"
           [class.text-blue-600]="isActive(item.path)"
           [class.text-slate-800]="!isActive(item.path)">
          {{ item.label }}
        </p>
        <p class="text-[12px] leading-snug mt-0.5"
           [class.text-blue-400]="isActive(item.path)"
           [class.text-slate-400]="!isActive(item.path)">
          {{ item.description }}
        </p>
      </div>
      <svg class="h-4 w-4 flex-shrink-0 transition-transform group-hover:translate-x-0.5"
           [class.text-blue-400]="isActive(item.path)"
           [class.text-slate-300]="!isActive(item.path)"
           fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
      </svg>
    </button>

    <!-- Logout -->
    <button
      type="button"
      class="w-full flex items-center gap-3 px-6 min-h-[58px] text-[15px] font-medium text-red-500 hover:bg-red-50 transition-colors"
      (click)="logout()"
    >
      <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
      </svg>
      Cerrar sesión
    </button>
  </nav>

</aside>
