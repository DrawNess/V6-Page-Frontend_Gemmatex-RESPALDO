<!-- ── Trigger bar (móvil) ────────────── -->
<div class="lg:hidden flex items-center justify-between bg-white px-4 py-3 mb-3">
  <div class="min-w-0">
    <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400">Mi cuenta</p>
    <p class="text-[14px] font-semibold text-slate-900 truncate leading-snug mt-0.5">{{ getFullName() }}</p>
  </div>
  <button type="button"
          class="flex-shrink-0 ml-3 flex items-center gap-1.5 rounded-md bg-slate-100 px-3 py-1.5 text-[12px] font-semibold text-slate-700 hover:bg-slate-200"
          (click)="open()">
    <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
    Menú
  </button>
</div>

<!-- ── Backdrop (móvil) ──────────────── -->
<div *ngIf="isOpen"
     class="fixed inset-0 z-40 bg-black/40 lg:hidden"
     (click)="close()">
</div>

<!-- ── Sidebar ─────────────────────── -->
<aside class="fixed top-0 left-0 h-full w-72 z-50 bg-white
              flex flex-col overflow-y-auto
              transition-transform duration-200 ease-out
              lg:sticky lg:top-6 lg:h-auto lg:w-full lg:z-auto lg:translate-x-0"
       [class.-translate-x-full]="!isOpen">

  <!-- Header perfil -->
  <div class="px-5 py-5 flex items-start justify-between border-b border-slate-200">
    <div class="min-w-0">
      <p class="text-[10px] font-bold uppercase tracking-widest text-blue-500">Cuenta</p>
      <p class="mt-1 text-[15px] font-semibold text-slate-900 truncate leading-snug">{{ getFullName() }}</p>
      <p class="text-[12px] text-slate-400 truncate leading-snug mt-0.5">{{ user?.email || '—' }}</p>
    </div>
    <button type="button"
            class="lg:hidden flex-shrink-0 ml-2 flex items-center justify-center h-7 w-7 rounded-md bg-slate-100 text-slate-500 hover:bg-slate-200"
            (click)="close()">
      <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  <!-- Nav: solo divisores horizontales -->
  <nav class="flex-1 divide-y divide-slate-100">
    <button
      *ngFor="let item of navItems"
      type="button"
      [routerLink]="item.path"
      class="w-full flex items-center justify-between px-5 py-3 text-left transition-colors border-l-2"
      [ngClass]="isActive(item.path)
        ? 'bg-blue-50 text-blue-700 border-l-blue-500 font-semibold'
        : 'text-slate-700 hover:bg-slate-50 border-l-transparent'"
    >
      <span class="text-[13px] tracking-wide">{{ item.label }}</span>
      <svg class="h-3.5 w-3.5"
           [class.text-blue-500]="isActive(item.path)"
           [class.text-slate-400]="!isActive(item.path)"
           fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
      </svg>
    </button>
  </nav>

  <!-- Logout -->
  <div class="border-t border-slate-200 p-3">
    <button type="button"
            class="w-full rounded-md bg-red-50 py-2 text-[13px] font-semibold text-red-600 hover:bg-red-100"
            (click)="logout()">
      Cerrar sesión
    </button>
  </div>
</aside>
