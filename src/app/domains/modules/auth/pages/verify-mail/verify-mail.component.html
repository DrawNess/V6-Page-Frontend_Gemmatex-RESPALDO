<section class="min-h-screen w-full bg-slate-50 flex items-center justify-center px-4 py-10">

  <div class="w-full max-w-sm">

    <!-- Logo -->
    <div class="mb-8 text-center">
      <img src="https://peru-crane-813567.hostingersite.com/Logos/Logo%20gemmatex%20azul.png"
           alt="Gemmatex" class="h-7 w-auto mx-auto" width="120" height="28" />
    </div>

    <div class="rounded-2xl border border-slate-200 bg-white shadow-sm overflow-hidden">
      <div class="h-1 w-full bg-[#0511F2]"></div>

      <div class="p-7">

        <!-- Estado: cargando -->
        @if (status === 'loading') {
          <div class="flex flex-col items-center text-center gap-4">
            <div class="flex h-14 w-14 items-center justify-center rounded-full bg-slate-100">
              <svg class="h-6 w-6 animate-spin text-[#0511F2]" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none" opacity=".2"/>
                <path d="M4 12a8 8 0 018-8" stroke="currentColor" stroke-width="4" fill="none"/>
              </svg>
            </div>
            <div>
              <p class="font-semibold text-slate-900">Verificando cuenta</p>
              <p class="mt-1 text-sm text-slate-500">{{ msg }}</p>
            </div>
          </div>
        }

        <!-- Estado: éxito -->
        @if (status === 'success') {
          <div class="flex flex-col items-center text-center gap-4">
            <div class="flex h-14 w-14 items-center justify-center rounded-full bg-emerald-50">
              <svg class="h-6 w-6 text-emerald-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
              </svg>
            </div>
            <div>
              <p class="font-bold text-slate-900">¡Cuenta verificada!</p>
              <p class="mt-1 text-sm text-slate-500">{{ msg }}</p>
            </div>
            <a routerLink="/auth/login"
               class="w-full rounded-xl bg-[#0511F2] px-4 py-2.5 text-sm font-bold text-white text-center
                      hover:bg-[#0511F2]/90 transition-colors">
              Iniciar sesión
            </a>
          </div>
        }

        <!-- Estado: error -->
        @if (status === 'error') {
          <div class="flex flex-col items-center text-center gap-4">
            <div class="flex h-14 w-14 items-center justify-center rounded-full bg-red-50">
              <svg class="h-6 w-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
              </svg>
            </div>
            <div>
              <p class="font-bold text-slate-900">No se pudo verificar</p>
              <p class="mt-1 text-sm text-slate-500">{{ msg }}</p>
            </div>
            <div class="flex flex-col w-full gap-2">
              <button type="button"
                      class="w-full rounded-xl bg-[#0511F2] px-4 py-2.5 text-sm font-bold text-white
                             hover:bg-[#0511F2]/90 transition-colors"
                      (click)="goLogin()">
                Ir a iniciar sesión
              </button>
              <a routerLink="/auth/verify-request"
                 class="w-full rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 text-center
                        hover:bg-slate-50 transition-colors">
                Reenviar enlace
              </a>
            </div>
          </div>
        }

      </div>
    </div>

  </div>

</section>
