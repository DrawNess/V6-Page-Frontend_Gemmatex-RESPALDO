<section class="min-h-screen bg-gradient-to-b from-slate-50 to-slate-100 px-4 py-10">
  <div class="mx-auto flex min-h-[70vh] max-w-xl items-center justify-center">
    <article class="w-full rounded-3xl border border-slate-200 bg-white p-8 shadow-xl">
      <div class="mx-auto mb-5 flex h-14 w-14 items-center justify-center rounded-full bg-emerald-100 text-emerald-700">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="m5 13 4 4L19 7" />
        </svg>
      </div>

      <h1 class="text-center text-2xl font-bold text-slate-900">
        {{ title }}
      </h1>
      <p class="mt-3 text-center text-sm text-slate-600">
        {{ message }}
      </p>

      <div class="mt-7 flex flex-col gap-3 sm:flex-row">
        <a
          routerLink="/auth/login"
          class="inline-flex w-full items-center justify-center rounded-xl bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-blue-700"
        >
          Ir a iniciar sesión
        </a>
        <a
          routerLink="/"
          class="inline-flex w-full items-center justify-center rounded-xl border border-slate-200 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 hover:bg-slate-50"
        >
          Volver al inicio
        </a>
      </div>
    </article>
  </div>
</section>
