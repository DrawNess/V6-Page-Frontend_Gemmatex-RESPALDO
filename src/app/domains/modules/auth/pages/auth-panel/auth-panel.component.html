<main class="min-h-screen w-full bg-gradient-to-b from-slate-50 to-slate-100
             flex items-center justify-center px-4 py-6">

  <!-- fondo sutil -->
  <div class="pointer-events-none fixed inset-0 opacity-60"
       style="background-image: radial-gradient(rgba(0, 0, 0, 0.05) 1px, transparent 1px);
              background-size: 18px 18px;"></div>

  <!-- Contenedor principal animado -->
  <div class="auth-container" [class.register-active]="isRegister()">

    <!-- Tabs (solo mobile) -->
    <div class="mobile-tabs">
      <button class="mobile-tab" [class.mobile-tab-active]="!isRegister()" (click)="showLogin()">
        Iniciar sesión
      </button>
      <button class="mobile-tab" [class.mobile-tab-active]="isRegister()" (click)="showRegister()">
        Crear cuenta
      </button>
    </div>

    <!-- Wrapper deslizante (solo desktop) — maneja el translateX -->
    <div class="form-wrapper">
      <!-- Form: Login -->
      <div class="form-panel login-panel">
        <app-login (switchToRegister)="showRegister()"></app-login>
      </div>

      <!-- Form: Register -->
      <div class="form-panel register-panel">
        <app-register (switchToLogin)="showLogin()"></app-register>
      </div>
    </div>

    <!-- Panel azul deslizante (solo desktop) -->
    <div class="toggle-box">

      <!-- Panel izquierdo: visible en modo login -->
      <div class="toggle-panel toggle-left">
        <!-- Brand mark -->

        <h2 class="text-4xl font-black leading-none tracking-[0.12em] text-white">
          BIENVENIDO
        </h2>
        <p class="hidden md:block mt-4 text-base text-white/80 max-w-[280px] leading-relaxed">
          Inicia sesión para acceder a tu panel de cliente.
        </p>
        <div class="hidden md:flex flex-col gap-2 mt-5">
          <div class="flex items-center gap-2 text-sm font-medium text-white/85">
            <svg class="h-3.5 w-3.5 shrink-0 text-white/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
            <span>Gestiona tus pedidos</span>
          </div>
          <div class="flex items-center gap-2 text-sm font-medium text-white/85">
            <svg class="h-3.5 w-3.5 shrink-0 text-white/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
            <span>Historial de compras</span>
          </div>
          <div class="flex items-center gap-2 text-sm font-medium text-white/85">
            <svg class="h-3.5 w-3.5 shrink-0 text-white/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
            <span>Soporte postventa</span>
          </div>
        </div>
        <p class="mt-6 text-sm text-white/60 max-w-[260px] leading-relaxed">
          ¿Aún no tienes cuenta? Regístrate gratis.
        </p>
        <button (click)="showRegister()"
                class="toggle-btn mt-6">
          Crear cuenta
        </button>
      </div>

      <!-- Panel derecho: visible en modo register -->
      <div class="toggle-panel toggle-right">
        <h2 class="text-4xl font-black leading-none tracking-[0.12em] text-white">
          BIENVENIDO<br>DE VUELTA
        </h2>
        <p class="mt-3 text-sm text-white/70 max-w-[200px] leading-relaxed">
          ¿Ya tienes cuenta? Inicia sesión para continuar.
        </p>
        <button (click)="showLogin()"
                class="toggle-btn mt-8">
          Iniciar sesión
        </button>
      </div>

    </div>
  </div>

</main>
