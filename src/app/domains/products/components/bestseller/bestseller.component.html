<div class="relative group">
  <!-- Glow CMYK de fondo -->
  <div
    class="pointer-events-none absolute inset-0 -z-10 opacity-30 blur-2xl transition group-hover:opacity-60
           bg-[conic-gradient(at_50%_50%,#06b6d4_0deg,#d946ef_120deg,#facc15_240deg,#06b6d4_360deg)]">
  </div>

  <!-- Marco degradado CMYK -->
  <div class="rounded-3xl p-[1px] bg-gradient-to-tr from-cyan-500 via-fuchsia-500 to-yellow-400
              shadow-[0_10px_30px_-10px_rgba(6,182,212,0.35)] group-hover:shadow-[0_20px_50px_-12px_rgba(217,70,239,0.45)] transition">
    <!-- Cuerpo (glass) -->
    <div class="rounded-[calc(theme(borderRadius.3xl)-1px)] bg-white/90 backdrop-blur
                supports-[backdrop-filter]:bg-white/60">

      <!-- IMAGEN + BADGES -->
      <a
        [routerLink]="['/product', product.id]"
        class="block relative overflow-hidden rounded-t-[calc(theme(borderRadius.3xl)-1px)] bg-slate-950"
        [attr.aria-label]="product.name"
      >
        <img
          [src]="product.imageUrl || '/assets/placeholder.webp'"
          [alt]="product.name"
          class="aspect-square w-full object-cover object-center transition duration-500 group-hover:scale-105 group-hover:opacity-95"
          loading="lazy"
          referrerpolicy="no-referrer"
        />

        <!-- Overlay CMYK suave -->
        <div class="pointer-events-none absolute inset-0 mix-blend-screen opacity-35">
          <div class="absolute inset-0 bg-[radial-gradient(circle_at_15%_10%,rgba(6,182,212,0.35),transparent_35%),radial-gradient(circle_at_85%_15%,rgba(217,70,239,0.25),transparent_35%),radial-gradient(circle_at_50%_85%,rgba(250,204,21,0.25),transparent_40%)]"></div>
        </div>

        <!-- Rank / BEST SELLER -->
        <div class="absolute right-3 top-3 flex items-center gap-2">
          <span *ngIf="rank as r" class="rounded-full bg-black/70 backdrop-blur px-2 py-0.5 text-xs font-semibold text-white shadow">
            #{{ r }}
          </span>
          <span class="rounded-full bg-yellow-400/90 px-2 py-0.5 text-[10px] font-extrabold text-black shadow">
            BEST SELLER
          </span>
        </div>

        <!-- Badges: descuento / stock / fluor / nuevo -->
        <div class="absolute left-3 top-3 flex flex-wrap gap-2">
          <span *ngIf="hasDiscount"
                class="rounded-full bg-red-500/90 px-2 py-0.5 text-xs font-bold text-white shadow">
            -{{ discountPercent }}%
          </span>

          <span *ngIf="!isSoldOut; else soldOut"
                class="rounded-full bg-emerald-600/90 px-2 py-0.5 text-xs font-medium text-white shadow">
            En stock
          </span>
          <ng-template #soldOut>
            <span class="rounded-full bg-gray-700/90 px-2 py-0.5 text-xs font-medium text-white shadow">
              Agotado
            </span>
          </ng-template>

          <span *ngIf="false"
                class="rounded-full bg-yellow-400/90 px-2 py-0.5 text-[10px] font-semibold text-black shadow">
            FLÚOR
          </span>

          <span *ngIf="isNew"
                class="rounded-full bg-sky-500/90 px-2 py-0.5 text-[10px] font-semibold text-white shadow">
            NUEVO
          </span>
        </div>
      </a>

      <!-- CONTENIDO -->
      <div class="flex flex-col gap-2 p-4">
        <!-- Subcategoría / fecha -->
        <div class="flex flex-wrap items-center gap-2 text-[11px] uppercase tracking-widest text-slate-500">
          <span class="inline-flex items-center gap-1 rounded-full bg-slate-900 text-white px-2 py-0.5">
            <!-- gotas CMYK -->
            <span class="h-2 w-2 rounded-full bg-cyan-400"></span>
            <span class="h-2 w-2 rounded-full bg-fuchsia-500"></span>
            <span class="h-2 w-2 rounded-full bg-yellow-400"></span>
            <span class="h-2 w-2 rounded-full bg-slate-900 border border-white/20"></span>
            {{ product.subcategory || 'Producto' }}
          </span>
          <span *ngIf="sku" class="ml-auto text-[10px] text-slate-400">SKU: {{ sku }}</span>
        </div>

        <!-- Título -->
        <h3 class="line-clamp-2 min-h-[2.5rem] text-sm font-semibold tracking-tight text-slate-900">
          {{ product.name }}
        </h3>

        <!-- Precio -->
        <div class="mt-1 flex items-baseline gap-2">
          <ng-container *ngIf="hasDiscount; else priceNormal">
            <span class="text-xl font-bold text-slate-900">
              {{ discountPrice | currency:'BOB':'symbol':'1.2-2' }}
            </span>
            <span class="text-sm text-slate-400 line-through">
              {{ price | currency:'BOB':'symbol':'1.2-2' }}
            </span>
          </ng-container>
          <ng-template #priceNormal>
            <span class="text-xl font-bold text-slate-900">
              {{ price | currency:'BOB':'symbol':'1.2-2' }}
            </span>
          </ng-template>
        </div>

        <!-- Botón -->
        <button
          class="relative mt-3 inline-flex w-full items-center justify-center overflow-hidden rounded-xl
                 bg-gradient-to-r from-cyan-600 via-fuchsia-500 to-yellow-400 px-4 py-2 text-sm
                 font-semibold text-white shadow transition hover:brightness-110
                 disabled:cursor-not-allowed disabled:opacity-50"
          (click)="onAdd()"
          [disabled]="isSoldOut"
        >
          <span class="pointer-events-none absolute inset-0 -translate-x-full bg-gradient-to-r from-white/0 via-white/35 to-white/0 transition-transform duration-700 group-hover:translate-x-full"></span>
          <svg class="mr-2 h-4 w-4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 3C9 7 6 9.5 6 13.2A6 6 0 1 0 18 13.2C18 9.5 15 7 12 3Z"/>
          </svg>
          {{ isSoldOut ? 'Agotado' : 'Añadir al carrito' }}
        </button>

        <!-- Barra CMYK decorativa -->
        <div class="mt-3 grid grid-cols-4 gap-1">
          <span class="h-1.5 rounded-full bg-cyan-500"></span>
          <span class="h-1.5 rounded-full bg-fuchsia-500"></span>
          <span class="h-1.5 rounded-full bg-yellow-400"></span>
          <span class="h-1.5 rounded-full bg-slate-900"></span>
        </div>
      </div>
    </div>
  </div>
</div>
