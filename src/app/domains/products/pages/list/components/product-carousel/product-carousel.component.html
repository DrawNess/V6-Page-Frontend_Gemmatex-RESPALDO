@defer (on viewport) {
  <section id="novedades" class="w-full bg-white">
    <div class="mx-auto max-w-7xl px-5 py-8 sm:py-10">

      <div class="mb-6 flex items-center justify-between gap-3">
        <div class="animate-fade-in-left">
          <h2 class="text-2xl sm:text-3xl font-extrabold text-slate-900 uppercase tracking-tight animate-fade-in-up delay-100">
            Novedades
          </h2>
          <p class="mt-1 text-sm text-slate-500 animate-fade-in-up delay-200">
            Descubre los últimos productos agregados a nuestro catálogo
          </p>
        </div>
        <div class="flex items-center gap-2 animate-fade-in-right">
          <button type="button"
                  class="h-9 w-9 grid place-items-center rounded-md border border-slate-300 promo-arrow"
                  (click)="prev()" aria-label="Anterior">‹</button>
          <button type="button"
                  class="h-9 w-9 grid place-items-center rounded-md border border-slate-300 promo-arrow"
                  (click)="next()" aria-label="Siguiente">›</button>
        </div>
      </div>

      <div #track
           class="grid grid-flow-col gap-4 sm:gap-5 lg:gap-6
                  auto-cols-[88%] sm:auto-cols-[50%] lg:auto-cols-[33.333%]
                  overflow-x-auto snap-x snap-mandatory scroll-smooth
                  touch-pan-x [-ms-overflow-style:none] [scrollbar-width:none]"
           (mouseenter)="pause()" (mouseleave)="resume()">
        @for (p of products(); track p.id) {
          <div class="snap-start">
            <app-product [product]="p" (addToCart)="addToCart($event)"></app-product>
          </div>
        }
      </div>

      <div class="mt-8 sm:mt-10 flex justify-center">
        <a routerLink="/productos"
           class="inline-flex items-center gap-2 rounded-lg border-2 border-[#0511F2]
                  px-5 py-2.5 sm:px-6 sm:py-3 text-sm sm:text-base
                  font-bold text-[#0511F2] uppercase tracking-wide
                  focus:outline-none focus-visible:ring-2 focus-visible:ring-[#0511F2]/30
                  btn-ink-outline animate-fade-in-up delay-200">
          Ver todo el catálogo
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 sm:h-5 sm:w-5" fill="none"
               viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6"/>
          </svg>
        </a>
      </div>

    </div>
  </section>
} @placeholder {
  <section class="w-full bg-white">
    <div class="mx-auto max-w-7xl px-5 py-8 sm:py-10">
      <div class="h-10 w-48 animate-pulse rounded bg-slate-100"></div>
      <div class="mt-4 h-[280px] animate-pulse bg-slate-100"></div>
    </div>
  </section>
}
